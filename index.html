
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pocket Garden</title>
    <meta name="version" content="1.0.9">
    <!-- PWA Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Pocket Garden">
    <meta name="theme-color" content="#050608">
    <link rel="manifest" href="./manifest.json">
    <!-- Fallback icons for iOS -->
    <link rel="apple-touch-icon" href="./assets/plants/plant_1.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        html, body {
            height: 100%;
        }
        #root {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f1115;
            color: #ffffff;
            margin: 0;
            padding: 0;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        /* Prevent mobile image long-press context menu */
        img {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            pointer-events: none;
        }
        /* Re-enable pointer events for interactive images where needed */
        .interactive-img {
            pointer-events: auto;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        /* Rounded Hexagon shape using SVG clip-path */
        .hexagon {
            clip-path: url(#rounded-hex-v2);
            -webkit-clip-path: url(#rounded-hex-v2);
        }
        .tab-content-container {
            display: flex;
            transition: transform 0.5s cubic-bezier(0.22, 0, 0.12, 1);
            width: 300%;
        }
        .tab-pane {
            width: 33.333333%;
        }

        /* Stylized Grass Texture */
        .grass-texture {
            background-color: #92c14c;
            background-image: 
                radial-gradient(circle at 10% 20%, #99bc54 0%, transparent 40%),
                radial-gradient(circle at 80% 10%, #8dbb42 0%, transparent 30%),
                radial-gradient(circle at 40% 60%, #a4ca62 0%, transparent 50%),
                radial-gradient(circle at 90% 90%, #7eb13d 0%, transparent 40%),
                url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.08'/%3E%3C/svg%3E");
            background-blend-mode: overlay;
        }

        .grass-blades {
            background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M10 35 Q10 25 15 20 M25 38 Q25 30 20 25 M32 32 Q35 25 30 20' stroke='rgba(0,0,0,0.03)' stroke-width='1.5' fill='none' stroke-linecap='round'/%3E%3C/svg%3E");
            background-size: 60px 60px;
        }
        /* Coin wallet bounce on impact: 1x -> peak -> 1x over 100ms (peak 2.5× stronger than original 1.3) */
        @keyframes coin-bounce {
            0% { transform: scale(1); }
            50% { transform: scale(1.75); }
            100% { transform: scale(1); }
        }
        .coin-bounce {
            animation: coin-bounce 100ms ease-out;
        }
        /* Coin wallet TEXT bounce on impact (peak 1.5× stronger than original 1.22) */
        @keyframes coin-text-bounce {
            0% { transform: scale(1); }
            35% { transform: scale(1.33); }
            100% { transform: scale(1); }
        }
        .coin-text-bounce {
            animation: coin-text-bounce 180ms cubic-bezier(0.22, 1, 0.36, 1);
        }
        /* Goal bounce: shift down then back, 500ms, fast start slow end */
        @keyframes goal-bounce {
            0% { transform: translateY(0); }
            30% { transform: translateY(12px); }
            100% { transform: translateY(0); }
        }
        .goal-bounce {
            animation: goal-bounce 500ms cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        /* Coin goal (5th slot): linear slide up and off when timer expires (no bounce) */
        @keyframes goal-slide-up-exit {
            from { transform: translateY(0); }
            to { transform: translateY(-100%); }
        }
        .goal-slide-up-exit {
            animation: goal-slide-up-exit 400ms ease-out forwards;
            pointer-events: none;
        }
        /* Seed/harvest blocked tap: linear rise (constant speed) + scale bounce; opacity separate */
        @keyframes side-action-toast-opacity {
            0% {
                opacity: 0;
                animation-timing-function: ease-out;
            }
            12% {
                opacity: 1;
                animation-timing-function: linear;
            }
            22% {
                opacity: 1;
                animation-timing-function: linear;
            }
            100% {
                opacity: 0;
            }
        }
        /* translateY keyed to % of total travel so linear segments = constant upward velocity */
        @keyframes side-action-toast-motion {
            0% {
                transform: translateY(0) scale(0.5);
                animation-timing-function: linear;
            }
            12% {
                transform: translateY(-3.6px) scale(1.1);
                animation-timing-function: linear;
            }
            22% {
                transform: translateY(-6.6px) scale(1);
                animation-timing-function: linear;
            }
            100% {
                transform: translateY(-30px) scale(1);
            }
        }
        .side-action-toast-text {
            display: block;
            color: #fcf0c7;
            font-weight: 800;
            white-space: pre-line;
            text-align: center;
            transform-origin: center center;
            animation:
                side-action-toast-opacity 1.15s forwards,
                side-action-toast-motion 1.15s forwards;
            /* Outline at 50% black */
            text-shadow:
                0 0 1px rgba(0, 0, 0, 0.5),
                1px 0 0 rgba(0, 0, 0, 0.5),
                -1px 0 0 rgba(0, 0, 0, 0.5),
                0 1px 0 rgba(0, 0, 0, 0.5),
                0 -1px 0 rgba(0, 0, 0, 0.5),
                1px 1px 0 rgba(0, 0, 0, 0.5),
                -1px -1px 0 rgba(0, 0, 0, 0.5),
                1px -1px 0 rgba(0, 0, 0, 0.5),
                -1px 1px 0 rgba(0, 0, 0, 0.5),
                0 2px 4px rgba(0, 0, 0, 0.225);
        }
        /* FTUE 4: same up/down motion, 6px down, loop forever (no white flash) */
        @keyframes goal-bounce-ftue4 {
            0% { transform: translateY(0); }
            30% { transform: translateY(6px); }
            100% { transform: translateY(0); }
        }
        .goal-bounce-ftue4 {
            animation: goal-bounce-ftue4 750ms ease-in-out infinite;
        }
        /* Goal slot fade-in: 0→100% opacity over 500ms (no bounce) */
        @keyframes goal-slot-fade-in {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }
        .goal-slot-fade-in {
            animation: goal-slot-fade-in 500ms ease-out forwards;
        }
        /* Fade-in + panel bounce together (e.g. FTUE 7 spawn) – both run on same element */
        .goal-slot-fade-in-with-bounce {
            animation: goal-slot-fade-in 500ms ease-out forwards, goal-bounce 500ms cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        /* Goal impact: light green flash 0% > 100% > 0% */
        @keyframes goal-impact-lightgreen {
            0% { opacity: 0; }
            50% { opacity: 1; }
            100% { opacity: 0; }
        }
        .goal-impact-lightgreen {
            animation: goal-impact-lightgreen 500ms cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        /* Goal icon scale bounce on impact */
        @keyframes goal-icon-bounce {
            0% { transform: translate(-50%, -2px) scale(1); }
            30% { transform: translate(-50%, -2px) scale(1.3); }
            100% { transform: translate(-50%, -2px) scale(1); }
        }
        .goal-icon-bounce {
            animation: goal-icon-bounce 500ms cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        /* Barn: plant mastery pending — white additive pulse (3s, sync via negative animation-delay from JS) */
        @keyframes plant-mastery-additive-pulse {
            0%, 100% { opacity: 0; }
            50% { opacity: 0.76; }
        }
        .plant-mastery-additive-pulse {
            animation: plant-mastery-additive-pulse 2s ease-in-out infinite;
        }
        /* Barn: one-shot reveal when drawing attention to pending mastery */
        @keyframes mastery-shed-reveal-bounce {
            0% { transform: scale(1); }
            25% { transform: scale(1.3); }
            50% { transform: scale(0.9); }
            75% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .mastery-shed-reveal-bounce {
            animation: mastery-shed-reveal-bounce 500ms ease-in-out forwards;
            transform-origin: 50% 50%;
        }
        @keyframes mastery-unlock-purchase-bounce {
            0% { transform: scale(0.5); }
            25% { transform: scale(1.5); }
            50% { transform: scale(0.8); }
            75% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .mastery-unlock-purchase-bounce {
            animation: mastery-unlock-purchase-bounce 500ms ease-in-out forwards;
            transform-origin: 50% 50%;
        }
        @keyframes mastery-unlock-white-flash {
            0% { filter: brightness(1) saturate(1); opacity: 1; }
            12% { filter: brightness(3.4) saturate(0.03) contrast(1.15); opacity: 1; }
            100% { filter: brightness(1) saturate(1) contrast(1); opacity: 1; }
        }
        .mastery-unlock-white-flash {
            animation: mastery-unlock-white-flash 220ms ease-out 1;
        }
        /* Goal slide up when collected (500ms) */
        @keyframes goal-slide-up {
            0% { transform: translateY(0); }
            100% { transform: translateY(-100%); }
        }
        .goal-slide-up {
            animation: goal-slide-up 500ms cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        /* Goal slide-over when one is removed: 350ms, ease-in-out-cubic */
        .goal-slide-over {
            transition: left 350ms cubic-bezier(0.65, 0, 0.35, 1);
        }
        .goal-no-transition {
            transition: none !important;
        }
        /* Boost indicators slide when one is removed (like goals) */
        .boost-slide {
            transition: left 350ms cubic-bezier(0.65, 0, 0.35, 1);
        }
        /* Progress bar flash: 50% white fade out over 300ms */
        @keyframes progress-bar-flash {
            0% { opacity: 0.5; }
            100% { opacity: 0; }
        }
        .progress-bar-flash {
            animation: progress-bar-flash 300ms ease-out forwards;
        }
        @keyframes store-free-offer-bounce {
            0% { transform: scale(1); }
            22% { transform: scale(1.07); }
            45% { transform: scale(0.96); }
            70% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }
        .store-free-offer-bounce {
            animation: store-free-offer-bounce 0.48s ease-in-out;
        }
        /* Toast: "Max Plant Reached" (board merge deny) */
        @keyframes max-plant-toast {
            0% { opacity: 0; transform: translate(-50%, -50%) translateY(8px) scale(0.98); }
            15% { opacity: 1; transform: translate(-50%, -50%) translateY(0px) scale(1); }
            75% { opacity: 1; transform: translate(-50%, -50%) translateY(-10px) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) translateY(-16px) scale(1.01); }
        }
        .max-plant-toast {
            animation: max-plant-toast 950ms ease-out forwards;
        }
    </style>
</head>
<body>
    <svg style="position: absolute; width: 0; height: 0; overflow: hidden;" aria-hidden="true">
      <defs>
        <clipPath id="rounded-hex-v2" clipPathUnits="objectBoundingBox">
          <path d="M 0.25 0 
                   L 0.75 0 
                   Q 0.8 0 0.83 0.05 
                   L 0.97 0.45 
                   Q 1 0.5 0.97 0.55 
                   L 0.83 0.95 
                   Q 0.8 1 0.75 1 
                   L 0.25 1 
                   Q 0.2 1 0.17 0.95 
                   L 0.03 0.55 
                   Q 0 0.5 0.03 0.45 
                   L 0.17 0.05 
                   Q 0.2 0 0.25 0 Z" />
        </clipPath>
      </defs>
    </svg>
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
</body>
</html>
